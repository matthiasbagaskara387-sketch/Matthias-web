<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Romantic Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #a18cd1);
      color: white;
      text-align: center;
      overflow-x: hidden;
    }.container {
  padding: 30px;
}

img {
  width: 140px;
  border-radius: 50%;
  border: 3px solid white;
  box-shadow: 0 0 20px rgba(255,255,255,0.5);
}

h1 {
  margin-top: 15px;
  font-size: 28px;
}

p {
  opacity: 0.9;
}

.link {
  display: block;
  margin: 15px auto;
  padding: 12px;
  width: 80%;
  max-width: 300px;
  border-radius: 25px;
  text-decoration: none;
  color: white;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.link:hover {
  background: rgba(255,255,255,0.4);
  transform: scale(1.05);
}

/* Floating hearts */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  animation: floatUp 5s linear infinite;
  opacity: 0.7;
}

@keyframes floatUp {
  0% {
    transform: translateY(0);
    opacity: 0.7;
  }
  100% {
    transform: translateY(-100vh);
    opacity: 0;
  }
}

  </style>
</head>
<body><div class="container">
  <img src="https://via.placeholder.com/150" alt="foto">
  <h1>Nama Kamu</h1>
  <p>"Tulisan romantis kamu di sini 💕"</p><a class="link" href="#">Instagram</a> <a class="link" href="#">TikTok</a> <a class="link" href="#">WhatsApp</a>

</div><!-- Musik otomatis --><audio autoplay loop>
  <source src="https://files.catbox.moe/8lqg3n.mp3" type="audio/mpeg">
</audio><!-- Efek hati --><script>
  function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }

  setInterval(createHeart, 300);
</script></body>
  </html>
