<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dibuat oleh matthias</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #a18cd1);
      color: white;
      text-align: center;
    }.container {
  padding: 20px;
  max-width: 400px;
  margin: auto;
}

img {
  width: 120px;
  border-radius: 50%;
  border: 3px solid white;
  margin-top: 20px;
}

.bubble {
  background: rgba(255,255,255,0.2);
  padding: 10px 15px;
  border-radius: 20px;
  display: inline-block;
  margin: 10px;
  backdrop-filter: blur(10px);
}

.question-box {
  margin-top: 20px;
}

input, textarea {
  width: 90%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  outline: none;
}

button {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: rgba(255,255,255,0.3);
  color: white;
  cursor: pointer;
}

.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  animation: floatUp 5s linear infinite;
  opacity: 0.7;
}

@keyframes floatUp {
  0% {transform: translateY(0); opacity: 0.7;}
  100% {transform: translateY(-100vh); opacity: 0;}
}

  </style>
</head>
<body><div class="container">
  <img src="https://via.placeholder.com/150">
  <h2>website Matthias 💖</h2>  <div class="bubble">aloo putt, jawab pertanyaan aku ya cantikkk💕</div>  <div class="question-box" id="questions">
    <!-- Pertanyaan muncul di sini -->
  </div><button onclick="addQuestion()">+ Tambah Pertanyaan</button>

</div><!-- Musik --><audio autoplay loop>
  <source src="https://files.catbox.moe/8lqg3n.mp3" type="audio/mpeg">
</audio><script>
  function addQuestion() {
    const box = document.getElementById('questions');

    const div = document.createElement('div');
    div.innerHTML = `
      <input type="text" placeholder="Tulis pertanyaan kamu...">
      <textarea placeholder="Jawaban di sini..."></textarea>`;

box.appendChild(div);

}

// efek hati function createHeart() { const heart = document.createElement("div"); heart.classList.add("heart"); heart.innerHTML = "💖"; heart.style.left = Math.random() * 100 + "vw"; heart.style.animationDuration = (Math.random() * 2 + 3) + "s"; document.body.appendChild(heart);

setTimeout(() => { heart.remove(); }, 5000);

}

setInterval(createHeart, 300); </script>

</body>
</html>
